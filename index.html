<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="任思琳的个人简介、教育背景与 AI 探索作品集。"
    />
    <title>个人网站 | AI 探索与个人简介</title>
    <link rel="stylesheet" href="styles.css?v=20260723-private-profile" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="回到首页">
        <span class="brand-mark">AI</span>
        <span class="brand-text" data-field="siteTitle">个人网站</span>
      </a>
      <nav class="nav" aria-label="主要导航">
        <a href="#profile">个人简介</a>
        <a href="#projects">AI 探索作品集</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow" data-field="eyebrow">Personal AI Lab</p>
          <h1 id="hero-title" data-field="name">你的名字</h1>
          <p class="hero-role" data-field="role">AI 探索者 / 产品与工程实践者</p>
          <p class="hero-summary" data-field="summary">
            这里用于展示个人简介与 AI 项目实践。
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#projects">查看项目</a>
          </div>
        </div>
        <aside class="signal-panel" aria-label="站点概览">
          <div>
            <span class="metric-value" data-field="projectCount">0</span>
            <span class="metric-label">AI 探索作品</span>
          </div>
          <div>
            <span class="metric-value" data-field="lastUpdated">待更新</span>
            <span class="metric-label">最近更新</span>
          </div>
        </aside>
      </section>

      <section id="profile" class="section profile-section" aria-labelledby="profile-title">
        <div class="section-heading">
          <p class="section-kicker">Profile</p>
          <h2 id="profile-title">个人简介与教育背景</h2>
        </div>
        <div class="profile-grid">
          <div class="bio-block">
            <h3>简介</h3>
            <p data-field="bio">
              补充你的职业背景、擅长领域、正在关注的 AI 方向，以及希望访客快速理解的个人定位。
            </p>
          </div>
          <div class="timeline" id="experience-list" aria-label="教育背景"></div>
        </div>
      </section>

      <section id="projects" class="section" aria-labelledby="projects-title">
        <div class="section-heading">
          <p class="section-kicker">Projects</p>
          <h2 id="projects-title">AI 探索作品集</h2>
        </div>
        <div class="card-grid" id="project-list"></div>
      </section>

    </main>

    <footer class="site-footer">
      <span data-field="footerName">个人网站</span>
      <span>Built as a small, editable AI portfolio.</span>
    </footer>

    <script src="content/site-data.js?v=20260723-private-profile"></script>
    <script src="app.js?v=20260723-private-profile"></script>
  </body>
</html>
